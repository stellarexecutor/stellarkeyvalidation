<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR | License Activation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #888;
            --success: #00ff88;
            --error: #ff4b4b;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; font-size: 2.5rem; }
        p { color: var(--text-dim); margin-bottom: 30px; font-size: 0.9rem; }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        select, input {
            width: 100%;
            padding: 18px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        .activate-btn {
            width: 100%;
            padding: 20px;
            margin-top: 10px;
            border-radius: 14px;
            border: none;
            background: white;
            color: black;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .activate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #message {
            margin-top: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            min-height: 20px;
        }

        .success { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .error { color: var(--error); text-shadow: 0 0 10px rgba(255, 75, 75, 0.3); }

        option { background: #111; color: white; }

    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="auth-card">
        <h1>STELLAR</h1>
        <p>Enter your license key to activate access.</p>

        <div class="input-group">
            <label>Product Type</label>
            <select id="productType">
                <option value="lifetime">Stellar Elite (Lifetime)</option>
                <option value="monthly">Stellar Lite (Monthly)</option>
            </select>
        </div>

        <div class="input-group">
            <label>License Key</label>
            <input type="text" id="licenseKey" placeholder="STELLAR-XXXX-XXXX-XXXX">
        </div>

        <button class="activate-btn" onclick="validateKey()">Activate License</button>

        <div id="message"></div>
    </div>

    <script>
        /* --- 3D Flying Starfield (Same as main site) --- */
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        const numStars = 200;
        const speed = 1.5;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * width - width/2,
                    y: Math.random() * height - height/2,
                    z: Math.random() * width,
                    pz: 0
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);
            ctx.translate(width/2, height/2);
            for (let s of stars) {
                s.z -= speed;
                if (s.z <= 0) s.z = width;
                let sx = (s.x / s.z) * width;
                let sy = (s.y / s.z) * width;
                let r = (1 - s.z/width) * 2;
                ctx.beginPath();
                ctx.fillStyle = 'white';
                ctx.arc(sx, sy, r, 0, Math.PI*2);
                ctx.fill();
                s.pz = s.z;
            }
            ctx.translate(-width/2, -height/2);
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();

        /* --- Validation Logic --- */
        const validKeys = [
            "STELLAR-8rF4-89Aj-fFj2",
            "STELLAR-85F8-jWAj-fT22",
            "STELLAR-LJN6-NJ6j-JJ37"
        ];

        function validateKey() {
            const inputKey = document.getElementById('licenseKey').value.trim();
            const product = document.getElementById('productType').value;
            const messageBox = document.getElementById('message');

            if (inputKey === "") {
                messageBox.innerHTML = '<span class="error">PLEASE ENTER A KEY</span>';
                return;
            }

            if (validKeys.includes(inputKey)) {
                messageBox.innerHTML = '<span class="success">SUCCESS: ' + product.toUpperCase() + ' ACTIVATED!</span>';
                
                // Optional: Redirect or unlock download after 2 seconds
                setTimeout(() => {
                    alert("License bound to HWID. You may now launch Stellar.");
                }, 1000);

            } else {
                messageBox.innerHTML = '<span class="error">INVALID OR EXPIRED LICENSE KEY</span>';
            }
        }
    </script>
</body>
</html>
